<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stadium Scramble – Letter Griddle Challenge Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#fffdf5;font-family:'Lora',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px}
  h1{font-family:'Playfair Display',serif;color:#92400e;font-size:1.6rem;text-align:center;margin-bottom:2px}
  .subtitle{color:#b45309;font-size:.85rem;margin-bottom:10px;text-align:center}
  .puzzle-selector{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:12px;max-width:500px}
  .puzzle-btn{background:#fff;border:2px solid #d97706;color:#92400e;border-radius:20px;padding:5px 12px;font-size:.78rem;cursor:pointer;font-family:'Lora',serif;transition:all .2s}
  .puzzle-btn:hover{background:#fef3c7}
  .puzzle-btn.active{background:#d97706;color:#fff;border-color:#d97706}
  .category-display{text-align:center;margin-bottom:6px}
  .category-name{font-family:'Playfair Display',serif;font-size:1.2rem;color:#92400e}
  .puzzle-num{font-size:.8rem;color:#b45309;margin-top:1px}
  .timer-box{background:#fff;border:2px solid #d97706;border-radius:20px;padding:6px 20px;margin-bottom:10px;font-size:.95rem;color:#92400e;font-weight:600;letter-spacing:.05em}
  .selected-display{min-height:28px;font-size:1.1rem;font-weight:700;color:#92400e;letter-spacing:.15em;text-align:center;margin-bottom:6px;font-family:'Playfair Display',serif}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:10px;max-width:340px;width:100%}
  .cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid #d97706;border-radius:10px;font-family:'Playfair Display',serif;font-size:1.1rem;color:#92400e;cursor:pointer;user-select:none;transition:all .15s;font-weight:700}
  .cell:hover{background:#fef3c7}
  .cell.selected{background:#3b82f6;border-color:#1d4ed8;color:#fff}
  .cell.found{background:#16a34a;border-color:#15803d;color:#fff;cursor:default}
  .cell.shake{animation:shake .4s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .buttons{display:flex;gap:10px;margin-bottom:12px}
  .btn{padding:8px 22px;border-radius:20px;border:none;font-family:'Lora',serif;font-size:.9rem;cursor:pointer;font-weight:600;transition:all .2s}
  .btn-submit{background:linear-gradient(135deg,#d97706,#b45309);color:#fff}
  .btn-submit:hover{background:linear-gradient(135deg,#b45309,#92400e)}
  .btn-clear{background:#fff;border:2px solid #d97706;color:#92400e}
  .btn-clear:hover{background:#fef3c7}
  .btn-undo{background:#fff;border:2px solid #d97706;color:#92400e}
.btn-undo:hover{background:#fef3c7}
  .words-panel{width:100%;max-width:340px;background:#fff;border:2px solid #d97706;border-radius:16px;padding:12px;margin-bottom:10px}
  .words-title{font-family:'Playfair Display',serif;color:#92400e;font-size:.95rem;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .word-item{padding:8px 10px;border-radius:10px;margin-bottom:6px;border:1.5px solid #fcd34d;background:#fffbeb}
  .word-item.found{background:#f0fdf4;border-color:#86efac}
  .word-hint{font-size:.78rem;color:#78350f;margin-bottom:3px}
  .word-blank{font-size:.95rem;font-weight:700;color:#92400e;letter-spacing:.12em;font-family:'Playfair Display',serif}
  .word-item.found .word-blank{color:#16a34a;text-decoration:line-through}
  /* Modals */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
  .modal{background:#fffdf5;border-radius:20px;padding:24px;max-width:340px;width:100%;text-align:center;border:3px solid #d97706}
  .modal h2{font-family:'Playfair Display',serif;color:#92400e;font-size:1.4rem;margin-bottom:10px}
  .modal p{color:#78350f;font-size:.9rem;line-height:1.6;margin-bottom:12px}
  .modal .fun-fact-box{background:#fef3c7;border:2px solid #fcd34d;border-radius:12px;padding:12px;margin-bottom:14px;font-size:.85rem;color:#78350f;line-height:1.6}
  .modal-btn{padding:9px 24px;border-radius:20px;border:none;font-family:'Lora',serif;font-size:.9rem;cursor:pointer;font-weight:600;margin:4px}
  .modal-btn-primary{background:linear-gradient(135deg,#d97706,#b45309);color:#fff}
  .modal-btn-secondary{background:#fff;border:2px solid #d97706;color:#92400e}
  .share-card{background:#fffbeb;border:2px solid #fcd34d;border-radius:12px;padding:12px;margin:10px 0;font-family:monospace;font-size:.85rem;color:#78350f;white-space:pre-line;text-align:left}
  canvas#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200}
</style>

</div>

<div class="selected-display" id="selectedDisplay">Select a letter to begin</div>

<div class="buttons">

  <button class="btn btn-undo" onclick="undoLetter()">⌫ Undo</button>
  <button class="btn btn-clear" onclick="clearSelection()">↺ Clear</button>
</div>
<div class="words-panel">

  <div id="wordsList"></div>
</div>

<!-- Fun Fact Modal -->
<div class="modal-overlay" id="factModal" style="display:none">
  <div class="modal">
    <h2>🎉 Puzzle Complete!</h2>
    <div class="fun-fact-box" id="factText"></div>
    <button class="modal-btn modal-btn-primary" onclick="showShareModal()">Share Results</button>
    <button class="modal-btn modal-btn-secondary" onclick="closeFactModal()">Close</button>
  </div>
</div>

<!-- Share Modal -->
<div class="modal-overlay" id="shareModal" style="display:none">
  <div class="modal">
    <h2>📋 Share Your Result</h2>
    <div class="share-card" id="shareCard"></div>
    <button class="modal-btn modal-btn-primary" onclick="copyShare()">Copy to Clipboard</button>
    <button class="modal-btn modal-btn-secondary" onclick="nextPuzzle()">Next Puzzle →</button>

let currentPuzzleIdx = 0;
let selectedCells = [];
let foundWords = [];
let timerInterval = null;
let seconds = 0;
let gameComplete = false;
let completionTime = '';

function initPuzzle(idx) {
  currentPuzzleIdx = idx;
  selectedCells = [];
  foundWords = [];
  seconds = 0;
  gameComplete = false;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!gameComplete) {
      seconds++;
      const m = Math.floor(seconds/60);
      const s = seconds%60;
      document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }
  }, 1000);
  document.getElementById('timerDisplay').textContent = '0:00';
  const p = PUZZLES[idx];
  document.getElementById('categoryName').textContent = `${p.emoji} ${p.category}`;
  document.getElementById('puzzleNum').textContent = `Puzzle #${p.number}`;
  document.getElementById('selectedDisplay').textContent = 'Select a letter to begin';
  renderGrid();
  renderWords();
  document.querySelectorAll('.puzzle-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
}

function renderGrid() {
  const p = PUZZLES[currentPuzzleIdx];
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let r=0; r<6; r++) {
    for (let c=0; c<6; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = p.grid[r][c];
      cell.dataset.r = r; cell.dataset.c = c;
      if (isCellFound(r,c)) { cell.classList.add('found'); }
      else { cell.addEventListener('click', () => toggleCell(r,c)); }
      grid.appendChild(cell);
    }
  }
}

function isCellFound(r,c) {
  const p = PUZZLES[currentPuzzleIdx];
  for (const fw of foundWords) {
    const wordObj = p.words.find(w=>w.word===fw);
    if (wordObj && wordObj.path.some(([pr,pc])=>pr===r&&pc===c)) return true;
  }
  return false;
}

function isAdjacent(r1,c1,r2,c2) {
  return Math.abs(r1-r2)<=1 && Math.abs(c1-c2)<=1 && !(r1===r2&&c1===c2);
}

function toggleCell(r,c) {
  if (gameComplete) return;
  if (isCellFound(r,c)) return;
  const idx = selectedCells.findIndex(([sr,sc])=>sr===r&&sc===c);
  if (idx !== -1) {
    selectedCells = selectedCells.slice(0, idx);
  } else {
    if (selectedCells.length > 0) {
      const [lr,lc] = selectedCells[selectedCells.length-1];
      if (!isAdjacent(lr,lc,r,c)) return;
    }
    selectedCells.push([r,c]);
  }
  updateSelectedDisplay();
  updateCellStyles();
}

function updateSelectedDisplay() {
  const p = PUZZLES[currentPuzzleIdx];
  if (selectedCells.length === 0) {
    document.getElementById('selectedDisplay').textContent = 'Select a letter to begin';
  } else {
    const letters = selectedCells.map(([r,c])=>p.grid[r][c]).join('');
    document.getElementById('selectedDisplay').textContent = letters;
  }
}

function updateCellStyles() {
  document.querySelectorAll('.cell').forEach(cell => {
    const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
    if (!isCellFound(r,c)) {
      cell.classList.toggle('selected', selectedCells.some(([sr,sc])=>sr===r&&sc===c));
    }
  });
}

function submitWord() {
  const p = PUZZLES[currentPuzzleIdx];
  const attempt = selectedCells.map(([r,c])=>p.grid[r][c]).join('');
  const match = p.words.find(w => w.word === attempt && !foundWords.includes(w.word));
  if (match) {
    const pathMatch = JSON.stringify(selectedCells) === JSON.stringify(match.path);
    if (!pathMatch) {
      // Still correct word but wrong path — shake and show message
      shakeGrid();
      clearSelection();
      return;
    }
    foundWords.push(match.word);
    selectedCells = [];
    renderGrid();
    renderWords();
    updateSelectedDisplay();
    if (foundWords.length === p.words.length) {
      gameComplete = true;
      clearInterval(timerInterval);
      const m = Math.floor(seconds/60);
      const s = seconds%60;
      completionTime = `${m}:${s.toString().padStart(2,'0')}`;
      setTimeout(() => { launchConfetti(); showFactModal(); }, 600);
    }
  } else {
    shakeGrid();
    clearSelection();
  }
}

function shakeGrid() {
  document.querySelectorAll('.cell.selected').forEach(c => {
    c.classList.add('shake');
    setTimeout(()=>c.classList.remove('shake'), 400);
  });
}

function clearSelection() {
  selectedCells = [];
  updateSelectedDisplay();
  updateCellStyles();
}
function undoLetter() {
  if (selectedCells.length === 0) return;
  selectedCells.pop();
  updateSelectedDisplay();
  updateCellStyles();
}

function renderWords() {
  const p = PUZZLES[currentPuzzleIdx];
  const list = document.getElementById('wordsList');
  list.innerHTML = '';
  p.words.forEach(w => {
    const div = document.createElement('div');
    div.className = 'word-item' + (foundWords.includes(w.word) ? ' found' : '');
    const blank = foundWords.includes(w.word) ? w.word : w.word.split('').map((_,i)=> i===0 ? '_' : ' _').join('');
    div.innerHTML = `<div class="word-hint">${w.hint}</div><div class="word-blank">${foundWords.includes(w.word) ? w.word : w.word.replace(/./g,'_ ').trim()}</div>`;
    list.appendChild(div);
  });
}

function showFactModal() {
  const p = PUZZLES[currentPuzzleIdx];
  document.getElementById('factText').textContent = '🍯 ' + p.funFact;
  document.getElementById('factModal').style.display = 'flex';
}

function closeFactModal() { document.getElementById('factModal').style.display = 'none'; }

function showShareModal() {
  closeFactModal();
  const p = PUZZLES[currentPuzzleIdx];
  const card = `🏟️ Stadium Scramble\n${p.emoji} ${p.category} · Puzzle #${p.number}\n⏱️ Completed in ${completionTime}!\n🟩🟩🟩🟩🟩\nPlay at lettergriddle.com/challenge 🏟️\nMore games at lettergriddle.com 🥞`;;
  document.getElementById('shareCard').textContent = card;
  document.getElementById('shareModal').style.display = 'flex';
}

function closeShareModal() { document.getElementById('shareModal').style.display = 'none'; }

function copyShare() {
  const text = document.getElementById('shareCard').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
  });
}

function nextPuzzle() {
  closeShareModal();
  const next = (currentPuzzleIdx + 1) % PUZZLES.length;
  initPuzzle(next);
}

// Confetti
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const pieces = Array.from({length:120},()=>({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height-canvas.height,
    r: Math.random()*6+3, color: ['#f59e0b','#10b981','#3b82f6','#ef4444','#8b5cf6'][Math.floor(Math.random()*5)],
    speed: Math.random()*3+2, drift: Math.random()*2-1
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      p.y += p.speed; p.x += p.drift;
    });
    frame++;
    if (frame < 360) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// Build puzzle selector buttons
const selector = document.getElementById('puzzleSelector');
PUZZLES.forEach((p,i) => {
  const btn = document.createElement('button');
  btn.className = 'puzzle-btn';
  btn.textContent = `${p.emoji} ${p.category}`;
  btn.onclick = () => initPuzzle(i);
  selector.appendChild(btn);
});

initPuzzle(0);
</script>
